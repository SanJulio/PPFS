<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Spendara — Register</title>
<style>
html, body { min-height: 100vh; background: #f2f4f7; }
.card { border-radius: 18px; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
input { border-radius: 12px !important; padding: 12px !important; font-size: 16px !important; }
.form-label { font-weight: 600; }
</style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">

      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='6000-logo.png') }}" alt="PPFS Logo" style="height:50px; object-fit:contain;" class="mb-2 d-block">
        <div class="text-muted">Your Pocket Personal Finance System</div>
      </div>

      <div class="card p-4">
        <h5 class="mb-4 fw-bold">Create an account</h5>

        {% if error %}
          <div class="alert alert-danger rounded-4">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" type="password" placeholder="At least 8 characters" required>
            <div class="form-text text-muted small mt-1">Min 8 characters, one uppercase letter and one number</div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" name="confirm" type="password" placeholder="••••••••" required>
          </div>
          <button class="btn btn-dark w-100 py-3">Create account</button>
        </form>

        <div class="text-center mt-3 text-muted small">
          Already have an account? <a href="/login" class="text-dark fw-semibold">Log in</a>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
