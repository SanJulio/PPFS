<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Spendara — Register</title>
<style>
html, body { min-height: 100vh; background: #f2f4f7; }
.card { border-radius: 18px; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
input { border-radius: 12px !important; padding: 12px !important; font-size: 16px !important; }
.form-label { font-weight: 600; }
</style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">

      <div class="text-center mb-4">
        <a href="/"><img src="{{ url_for('static', filename='6000-logo.png') }}" alt="PPFS Logo" style="height:50px; object-fit:contain;" class="mb-2 d-block"></a>
        <div class="text-muted">Track your money as you go</div>
      </div>

      <div class="card p-4">
        <h5 class="mb-4 fw-bold">Create an account</h5>

        {% if error %}
          <div class="alert alert-danger rounded-4">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" id="passwordInput" name="password" type="password" placeholder="At least 8 characters" required>
            <div style="height:4px; border-radius:4px; background:#e9ecef; margin-top:8px; overflow:hidden;">
              <div id="strengthBar" style="height:100%; width:0%; border-radius:4px; transition:width 0.3s ease, background 0.3s ease;"></div>
            </div>
            <div id="strengthText" class="form-text small mt-1" style="min-height:18px;"></div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" name="confirm" type="password" placeholder="••••••••" required>
          </div>
          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="age_confirm" id="ageConfirm" required>
              <label class="form-check-label small text-muted" for="ageConfirm">
                I am 16 or over and agree to the <a href="/privacy" class="text-dark">Privacy Policy</a>
              </label>
            </div>
          </div>
          <button class="btn btn-dark w-100 py-3">Create account</button>
        </form>

        <div class="text-center mt-3 text-muted small">
          Already have an account? <a href="/login" class="text-dark fw-semibold">Log in</a>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="cookieBanner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#111; color:#fff; padding:14px 20px; z-index:9999; font-size:13px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
  <span>We use essential cookies to keep you logged in. No tracking or advertising cookies. <a href="/privacy" style="color:#adb5bd;">Privacy Policy</a></span>
  <button onclick="document.getElementById('cookieBanner').style.display='none'; localStorage.setItem('cookieOk','1')" style="background:white; color:#111; border:none; border-radius:8px; padding:6px 16px; font-weight:600; cursor:pointer; white-space:nowrap;">Got it</button>
</div>

<script>
if (!localStorage.getItem('cookieOk')) document.getElementById('cookieBanner').style.display='flex';
document.querySelectorAll('form:not([onsubmit])').forEach(function(form) {
  var btn = form.querySelector('.btn-dark');
  if (!btn) return;
  form.addEventListener('submit', function() {
    btn.disabled = true;
    btn.textContent = 'Please wait...';
  });
});

document.getElementById('passwordInput').addEventListener('input', function() {
  const val = this.value;
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');

  const hasLength = val.length >= 8;
  const hasUpper = /[A-Z]/.test(val);
  const hasNumber = /[0-9]/.test(val);
  const score = [hasLength, hasUpper, hasNumber].filter(Boolean).length;

  const levels = [
    { width: '0%',   bg: '',        label: '' },
    { width: '33%',  bg: '#dc3545', label: 'Weak' },
    { width: '66%',  bg: '#fd7e14', label: 'Almost there' },
    { width: '100%', bg: '#198754', label: 'Strong ✓' },
  ];

  if (val.length === 0) {
    bar.style.width = '0%';
    text.textContent = '';
    text.style.color = '';
  } else {
    const level = levels[score];
    bar.style.width = level.width;
    bar.style.background = level.bg;
    text.textContent = level.label;
    text.style.color = level.bg;
  }
});
</script>
</body>
</html>
