<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/static/manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<title>Spendara — Forecast</title>
<style>
html, body { min-height: 100vh; }
html { scroll-behavior: smooth; scroll-padding-bottom: 110px; }
.navbar { height: 70px; }
.navbar small { font-size: 11px; }
.navbar a { display:flex; flex-direction:column; align-items:center; }
.fixed-bottom { position: fixed !important; bottom: 0; left: 0; right: 0; z-index: 9999; }
body { background: #f2f4f7; padding-bottom: 110px; }
.card { border-radius: 18px; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
.money { font-variant-numeric: tabular-nums; }
.badge-soft {
  background: rgba(0,0,0,0.06);
  color: #111;
  border-radius: 999px;
  padding: 6px 10px;
  font-weight: 600;
  font-size: 12px;
}
.btn-period { border-radius: 999px; font-size: 13px; padding: 6px 16px; }
.btn-period.active { background: #111; color: white; border-color: #111; }
</style>
</head>
<body>

<div id="forecast-data"
  data-snapshots='{{ snapshots }}'
  data-accounts='{{ account_names }}'
  style="display:none">
</div>

<div class="container py-4">

  <div class="mb-4">
    <img src="{{ url_for('static', filename='6000-logo.png') }}" alt="Spendara Logo" style="height:50px; object-fit:contain;" class="mb-2 d-block">
    <h1 class="display-6 fw-bold">Forecast</h1>
    <div class="text-muted">Predicted account balances over time</div>
  </div>

  <div class="d-flex gap-2 mb-4">
    <button class="btn btn-outline-secondary btn-period active" onclick="setPeriod(30, this)">30 days</button>
    <button class="btn btn-outline-secondary btn-period" onclick="setPeriod(60, this)">60 days</button>
    <button class="btn btn-outline-secondary btn-period" onclick="setPeriod(90, this)">90 days</button>
  </div>

  <div id="warnings"></div>

  <div id="forecastEmpty" class="card p-5 text-center text-muted mb-4 d-none">
    <div class="fs-2 mb-2">📈</div>
    <div class="fw-bold mb-1">Nothing to forecast yet</div>
    <div class="small mb-3">Add an account and some bills or income so Spendara can predict your future balances</div>
    <a href="/settings" class="btn btn-dark btn-sm rounded-3 px-4">Go to Settings</a>
  </div>

  <div class="card p-3 mb-4" id="forecastChartCard">
    <canvas id="forecastChart" height="260"></canvas>
  </div>

  <div id="accountSummary"></div>

</div>

<nav class="navbar fixed-bottom bg-white border-top">
  <div class="container-fluid d-flex justify-content-around text-center">
    <a href="/" class="text-decoration-none text-dark">
      <div style="font-size:20px">🏠</div>
      <small>Home</small>
    </a>
    <a href="/actions" class="text-decoration-none text-dark">
      <div style="font-size:20px">⚡</div>
      <small>Actions</small>
    </a>
    <a href="/flow" class="text-decoration-none text-dark">
      <div style="font-size:20px">💸</div>
      <small>Flow</small>
    </a>
    <a href="/forecast" class="text-decoration-none text-dark">
      <div style="font-size:20px">📈</div>
      <small>Forecast</small>
    </a>
    <a href="/transactions" class="text-decoration-none text-dark">
      <div style="font-size:20px">📜</div>
      <small>Transactions</small>
    </a>
    <a href="/settings" class="text-decoration-none text-dark">
      <div style="font-size:20px">⚙️</div>
      <small>Account</small>
    </a>
  </div>
</nav>

<script>
var forecastEl = document.getElementById('forecast-data');
var snapshots = JSON.parse(forecastEl.getAttribute('data-snapshots'));
var accountNames = JSON.parse(forecastEl.getAttribute('data-accounts'));

var COLORS = [
  '#111111', '#3b82f6', '#10b981', '#f59e0b',
  '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'
];

var chart = null;

if (accountNames.length === 0) {
  document.getElementById('forecastEmpty').classList.remove('d-none');
  document.getElementById('forecastChartCard').classList.add('d-none');
  document.querySelectorAll('.btn-period').forEach(function(b) { b.disabled = true; });
}

function setPeriod(days, btn) {
  document.querySelectorAll('.btn-period').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderChart(days);
}

function renderChart(days) {
  var data = snapshots.slice(0, days);
  var labels = data.map(function(s) {
    var d = new Date(s.date);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  });

  var datasets = accountNames.map(function(acc, i) {
    return {
      label: acc,
      data: data.map(function(s) { return s[acc]; }),
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + '18',
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      fill: false
    };
  });

  if (chart) { chart.destroy(); }

  var ctx = document.getElementById('forecastChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: function(c) { return ' ' + c.dataset.label + ': £' + c.parsed.y.toFixed(2); }
          }
        }
      },
      scales: {
        x: {
          ticks: { maxTicksLimit: 8, font: { size: 11 } },
          grid: { display: false }
        },
        y: {
          ticks: {
            font: { size: 11 },
            callback: function(v) { return '£' + v.toLocaleString(); }
          },
          grid: { color: 'rgba(0,0,0,0.05)' }
        }
      }
    }
  });

  renderWarnings(data);
  renderSummary(data);
}

function renderWarnings(data) {
  var box = document.getElementById('warnings');
  var issues = [];

  accountNames.forEach(function(acc) {
    var lowest = Math.min.apply(null, data.map(function(s) { return s[acc]; }));
    if (lowest < 0) {
      var firstNeg = data.find(function(s) { return s[acc] < 0; });
      var d = new Date(firstNeg.date);
      var dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      issues.push('<strong>' + acc + '</strong> goes negative on ' + dateStr + ' (lowest: £' + lowest.toFixed(2) + ')');
    }
  });

  if (issues.length > 0) {
    box.innerHTML = '<div class="alert rounded-4 mb-3" style="background:#fff3cd; border:none;"><div class="fw-bold mb-1">⚠️ Balance warnings</div>' + issues.map(function(i) { return '<div class="small">' + i + '</div>'; }).join('') + '</div>';
  } else {
    box.innerHTML = '<div class="alert rounded-4 mb-3" style="background:#d1fae5; border:none;"><div class="fw-bold">✅ All accounts stay positive over this period</div></div>';
  }
}

function renderSummary(data) {
  var box = document.getElementById('accountSummary');
  var last = data[data.length - 1];
  var first = snapshots[0];

  var cards = accountNames.map(function(acc, i) {
    var endVal = last[acc];
    var startVal = first[acc];
    var change = endVal - startVal;
    var lowest = Math.min.apply(null, data.map(function(s) { return s[acc]; }));
    var color = COLORS[i % COLORS.length];
    var isNeg = lowest < 0;

    return '<div class="card p-3 mb-3">' +
      '<div class="d-flex justify-content-between align-items-center mb-2">' +
        '<div class="fw-bold d-flex align-items-center gap-2">' +
          '<span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:' + color + '"></span>' +
          acc +
        '</div>' +
        '<span class="badge-soft' + (isNeg ? ' text-danger' : '') + '">' + (isNeg ? '⚠️ Risk' : '✅ Safe') + '</span>' +
      '</div>' +
      '<div class="row g-2 text-center">' +
        '<div class="col-4"><div class="small text-muted">End balance</div><div class="fw-bold money">£' + endVal.toFixed(2) + '</div></div>' +
        '<div class="col-4"><div class="small text-muted">Change</div><div class="fw-bold money ' + (change >= 0 ? 'text-success' : 'text-danger') + '">' + (change >= 0 ? '+' : '') + '£' + change.toFixed(2) + '</div></div>' +
        '<div class="col-4"><div class="small text-muted">Lowest</div><div class="fw-bold money' + (lowest < 0 ? ' text-danger' : '') + '">£' + lowest.toFixed(2) + '</div></div>' +
      '</div>' +
    '</div>';
  });

  box.innerHTML = cards.join('');
}

if (accountNames.length > 0) { renderChart(30); }

if (window.location.search.includes('msg=')) {
  const url = new URL(window.location);
  url.searchParams.delete('msg');
  window.history.replaceState({}, '', url);
}
</script>
<script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/static/sw.js"); }</script>
</body>
</html>
