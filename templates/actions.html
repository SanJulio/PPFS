<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>PPFS — Actions</title>
<style>
html, body { min-height: 100vh; }
html { scroll-behavior: smooth; scroll-padding-bottom: 110px; }
.navbar { height: 70px; }
.navbar small { font-size: 11px; }
.navbar a { display:flex; flex-direction:column; align-items:center; }
.fixed-bottom { position: fixed !important; bottom: 0; left: 0; right: 0; z-index: 9999; }
body { background: #f2f4f7; padding-bottom: 110px; }
.card { border-radius: 18px; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
h1 { font-weight: 700; }
input, select { border-radius: 12px !important; padding: 12px !important; font-size: 16px !important; }
.form-label { font-weight: 600; }
</style>
</head>
<body>
<div class="container py-4">

  <div class="mb-4">
    <h1 class="display-6 fw-bold">Actions</h1>
    <div class="text-muted">Add expenses, income or transfer money</div>
  </div>

  {% if message %}
    <div class="alert alert-info rounded-4">{{ message }}</div>
  {% endif %}

  <!-- ADD EXPENSE -->
  <div class="card p-3 mb-4" id="expense">
    <h5 class="mb-3">Add Expense</h5>
    <form method="POST" action="{{ url_for('add_expense') }}">
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input class="form-control" name="description" placeholder="e.g. Tesco meal deal" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount (£)</label>
        <input class="form-control" name="amount" inputmode="decimal" placeholder="4.50" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Account</label>
        <select class="form-select" name="account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-dark w-100 py-3">Add Expense</button>
    </form>
  </div>

  <!-- ADD INCOME -->
  <div class="card p-3 mb-4" id="income">
    <h5 class="mb-3">Add Income</h5>
    <form method="POST" action="{{ url_for('add_income') }}">
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input class="form-control" name="description" placeholder="e.g. Salary / Refund" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount (£)</label>
        <input class="form-control" name="amount" inputmode="decimal" placeholder="e.g. 394.30" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Account</label>
        <select class="form-select" name="account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-dark w-100 py-3">Add Income</button>
    </form>
  </div>

  <!-- TRANSFER -->
  <div class="card p-3 mb-4" id="transfer">
    <h5 class="mb-3">Transfer Between Accounts</h5>
    <form method="POST" action="{{ url_for('transfer') }}">
      <div class="mb-3">
        <label class="form-label">From account</label>
        <select class="form-select" name="from_account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">To account</label>
        <select class="form-select" name="to_account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount (£)</label>
        <input class="form-control" name="amount" inputmode="decimal" placeholder="e.g. 100" required>
      </div>
      <button type="submit" class="btn btn-dark w-100 py-3">Transfer</button>
    </form>
  </div>

</div>

<nav class="navbar fixed-bottom bg-white border-top">
  <div class="container-fluid d-flex justify-content-around text-center">
    <a href="/" class="text-decoration-none text-dark">
      <div style="font-size:20px">🏠</div>
      <small>Home</small>
    </a>
    <a href="/settings" class="text-decoration-none text-dark">
      <div style="font-size:20px">⚙️</div>
      <small>Settings</small>
    </a>
    <a href="/actions" class="text-decoration-none text-dark">
      <div style="font-size:20px">⚡</div>
      <small>Actions</small>
    </a>
    <a href="/bills" class="text-decoration-none text-dark">
      <div style="font-size:20px">💳</div>
      <small>Bills</small>
    </a>
    <a href="/transactions" class="text-decoration-none text-dark">
      <div style="font-size:20px">📜</div>
      <small>Transactions</small>
    </a>
  </div>
</nav>
</body>
</html>
