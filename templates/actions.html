<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>PPFS — Actions</title>
<style>
html, body { min-height: 100vh; }
html { scroll-behavior: smooth; scroll-padding-bottom: 110px; }
.navbar { height: 70px; }
.navbar small { font-size: 11px; }
.navbar a { display:flex; flex-direction:column; align-items:center; }
.fixed-bottom { position: fixed !important; bottom: 0; left: 0; right: 0; z-index: 9999; }
body { background: #f2f4f7; padding-bottom: 110px; }
.card { border-radius: 18px; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
h1 { font-weight: 700; }
input, select { border-radius: 12px !important; padding: 12px !important; font-size: 16px !important; }
.form-label { font-weight: 600; }

/* Calculator */
.calc-btn {
  border-radius: 12px;
  font-size: 18px;
  font-weight: 600;
  padding: 14px;
  border: none;
  width: 100%;
}
.calc-display {
  background: #111;
  color: #fff;
  border-radius: 12px;
  padding: 16px;
  font-size: 28px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  min-height: 70px;
  word-break: break-all;
}
.calc-display .sub {
  font-size: 13px;
  color: #aaa;
  min-height: 18px;
}
</style>
</head>
<body>
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-start mb-4">
    <div>
      <img src="{{ url_for('static', filename='6000-logo.png') }}" alt="PPFS Logo" style="height:50px; object-fit:contain;" class="mb-2 d-block">
      <h1 class="display-6 fw-bold">Actions</h1>
      <div class="text-muted">Add expenses, income or transfer money</div>
    </div>
    <button class="btn btn-dark rounded-3 px-3 py-2 mt-1" data-bs-toggle="modal" data-bs-target="#calcModal">
      🧮
    </button>
  </div>

  {% if message %}
    <div class="alert alert-info rounded-4">{{ message }}</div>
  {% endif %}

  <!-- ADD EXPENSE -->
  <div class="card p-3 mb-4" id="expense">
    <h5 class="mb-3">Add Expense</h5>
    <form method="POST" action="{{ url_for('add_expense') }}">
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input class="form-control" name="description" placeholder="e.g. Tesco meal deal" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount (£)</label>
        <input class="form-control" name="amount" inputmode="decimal" placeholder="4.50" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Account</label>
        <select class="form-select" name="account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-dark w-100 py-3">Add Expense</button>
    </form>
  </div>

  <!-- ADD INCOME -->
  <div class="card p-3 mb-4" id="income">
    <h5 class="mb-3">Add Income</h5>
    <form method="POST" action="{{ url_for('add_income') }}">
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input class="form-control" name="description" placeholder="e.g. Salary / Refund" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount (£)</label>
        <input class="form-control" name="amount" inputmode="decimal" placeholder="e.g. 394.30" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Account</label>
        <select class="form-select" name="account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-dark w-100 py-3">Add Income</button>
    </form>
  </div>

  <!-- TRANSFER -->
  <div class="card p-3 mb-4" id="transfer">
    <h5 class="mb-3">Transfer Between Accounts</h5>
    <form method="POST" action="{{ url_for('transfer') }}">
      <div class="mb-3">
        <label class="form-label">From account</label>
        <select class="form-select" name="from_account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">To account</label>
        <select class="form-select" name="to_account" required>
          {% for a in accounts %}
            <option value="{{ a }}">{{ a }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount (£)</label>
        <input class="form-control" name="amount" inputmode="decimal" placeholder="e.g. 100" required>
      </div>
      <button type="submit" class="btn btn-dark w-100 py-3">Transfer</button>
    </form>
  </div>

</div>

<!-- CALCULATOR MODAL -->
<div class="modal fade" id="calcModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 p-3 pb-5 mb-4">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">Calculator</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="calc-display mb-3">
        <div class="sub" id="calcExpression"></div>
        <div id="calcDisplay">0</div>
      </div>

      <div class="row g-2">
        <!-- Row 1 -->
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('sin(')">sin</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('cos(')">cos</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('tan(')">tan</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('sqrt(')">√</button></div>
        <!-- Row 2 -->
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('(')"> ( </button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput(')')"> ) </button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('**')">xʸ</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('%')">%</button></div>
        <!-- Row 3 -->
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('7')">7</button></div>
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('8')">8</button></div>
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('9')">9</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('/')">÷</button></div>
        <!-- Row 4 -->
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('4')">4</button></div>
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('5')">5</button></div>
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('6')">6</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('*')">×</button></div>
        <!-- Row 5 -->
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('1')">1</button></div>
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('2')">2</button></div>
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('3')">3</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('-')">−</button></div>
        <!-- Row 6 -->
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('0')">0</button></div>
        <div class="col-3"><button class="calc-btn bg-white border" onclick="calcInput('.')">.</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcBackspace()">⌫</button></div>
        <div class="col-3"><button class="calc-btn bg-light" onclick="calcInput('+')">+</button></div>
        <!-- Row 7 -->
        <div class="col-6"><button class="calc-btn bg-light text-danger" onclick="calcClear()">Clear</button></div>
        <div class="col-6"><button class="calc-btn bg-dark text-white" onclick="calcEquals()">=</button></div>
      </div>

    </div>
  </div>
</div>

<nav class="navbar fixed-bottom bg-white border-top">
  <div class="container-fluid d-flex justify-content-around text-center">
    <a href="/" class="text-decoration-none text-dark">
      <div style="font-size:20px">🏠</div>
      <small>Home</small>
    </a>
    <a href="/actions" class="text-decoration-none text-dark">
      <div style="font-size:20px">⚡</div>
      <small>Actions</small>
    </a>
    <a href="/flow" class="text-decoration-none text-dark">
      <div style="font-size:20px">💸</div>
      <small>Flow</small>
    </a>
    <a href="/transactions" class="text-decoration-none text-dark">
      <div style="font-size:20px">📜</div>
      <small>Transactions</small>
    </a>
    <a href="/settings" class="text-decoration-none text-dark">
      <div style="font-size:20px">⚙️</div>
      <small>Account</small>
    </a>
    <a href="/logout" class="text-decoration-none text-dark">
      <div style="font-size:20px">🚪</div>
      <small>Logout</small>
    </a>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let calcExpr = '';

function calcInput(val) {
  calcExpr += val;
  document.getElementById('calcDisplay').textContent = calcExpr;
}

function calcClear() {
  calcExpr = '';
  document.getElementById('calcDisplay').textContent = '0';
  document.getElementById('calcExpression').textContent = '';
}

function calcBackspace() {
  calcExpr = calcExpr.slice(0, -1);
  document.getElementById('calcDisplay').textContent = calcExpr || '0';
}

function calcEquals() {
  try {
    // Replace sqrt( with Math.sqrt(, sin( with Math.sin( etc
    let expr = calcExpr
      .replace(/sqrt\(/g, 'Math.sqrt(')
      .replace(/sin\(/g, 'Math.sin(')
      .replace(/cos\(/g, 'Math.cos(')
      .replace(/tan\(/g, 'Math.tan(');

    const result = Function('"use strict"; return (' + expr + ')')();
    document.getElementById('calcExpression').textContent = calcExpr + ' =';
    document.getElementById('calcDisplay').textContent = parseFloat(result.toFixed(10));
    calcExpr = String(parseFloat(result.toFixed(10)));
  } catch (e) {
    document.getElementById('calcDisplay').textContent = 'Error';
    calcExpr = '';
  }
}
</script>
</body>
</html>
