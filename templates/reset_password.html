<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
<meta name="theme-color" content="#ffffff">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Spendara — Reset Password</title>
<style>
html, body { min-height: 100vh; background: #f2f4f7; }
.card { border-radius: 18px; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
input { border-radius: 12px !important; padding: 12px !important; font-size: 16px !important; }
.form-label { font-weight: 600; }
.pw-rule { font-size: 13px; color: #888; margin-bottom: 4px; transition: color 0.15s; }
.pw-rule:last-child { margin-bottom: 0; }
.pw-rule.met { color: #059669; }
</style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">
      <div class="text-center mb-4">
        <a href="/"><img src="{{ url_for('static', filename='6000-logo.png') }}" alt="Spendara Logo" style="height:50px; object-fit:contain;" class="mb-2 d-block mx-auto"></a>
        <div class="text-muted">Your Pocket Personal Finance System</div>
      </div>
      <div class="card p-4">
        <h5 class="mb-1 fw-bold">Choose a new password</h5>
        <p class="text-muted small mb-4">Must meet the requirements shown below.</p>

        {% if message %}
          <div class="alert alert-danger rounded-4">{{ message }}</div>
        {% endif %}

        <form method="POST" action="/reset-password/{{ token }}">
          <input type="hidden" name="csrf_token" value="{{ session['csrf_token'] }}">
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <div class="input-group">
              <input class="form-control" id="passwordInput" name="password" type="password" placeholder="••••••••" required style="border-radius:12px 0 0 12px !important;">
              <button type="button" class="btn btn-outline-secondary" id="togglePassword" style="border-radius:0 12px 12px 0 !important; border-left:0; padding:0 14px;" onclick="togglePw('passwordInput','togglePassword')">
                <svg id="eye-passwordInput" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/></svg>
              </button>
            </div>
            <div id="pwChecklist" style="margin-top:10px; display:none; background:#f8f9fa; border-radius:10px; padding:10px 12px;">
              <div id="chk-len"    class="pw-rule">&#x25CB; At least 8 characters</div>
              <div id="chk-upper"  class="pw-rule">&#x25CB; One uppercase letter</div>
              <div id="chk-lower"  class="pw-rule">&#x25CB; One lowercase letter</div>
              <div id="chk-number" class="pw-rule">&#x25CB; One number</div>
              <div id="chk-symbol" class="pw-rule">&#x25CB; One symbol (!@#$…)</div>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
              <input class="form-control" id="confirmInput" name="confirm" type="password" placeholder="••••••••" required style="border-radius:12px 0 0 12px !important;">
              <button type="button" class="btn btn-outline-secondary" id="toggleConfirm" style="border-radius:0 12px 12px 0 !important; border-left:0; padding:0 14px;" onclick="togglePw('confirmInput','toggleConfirm')">
                <svg id="eye-confirmInput" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/></svg>
              </button>
            </div>
          </div>
          <button class="btn btn-dark w-100 py-3">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function togglePw(inputId, btnId) {
  var input = document.getElementById(inputId);
  var isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  var eye = document.getElementById('eye-' + inputId);
  if (isHidden) {
    eye.innerHTML = '<path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/><path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709z"/><path fill-rule="evenodd" d="M13.646 14.354l-12-12 .708-.708 12 12-.708.708z"/>';
  } else {
    eye.innerHTML = '<path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>';
  }
}

document.getElementById('passwordInput').addEventListener('input', function() {
  var val = this.value;
  var list = document.getElementById('pwChecklist');
  list.style.display = val.length > 0 ? 'block' : 'none';

  var rules = [
    { id: 'chk-len',    ok: val.length >= 8,           label: 'At least 8 characters' },
    { id: 'chk-upper',  ok: /[A-Z]/.test(val),         label: 'One uppercase letter' },
    { id: 'chk-lower',  ok: /[a-z]/.test(val),         label: 'One lowercase letter' },
    { id: 'chk-number', ok: /[0-9]/.test(val),         label: 'One number' },
    { id: 'chk-symbol', ok: /[^A-Za-z0-9]/.test(val), label: 'One symbol (!@#$…)' },
  ];

  rules.forEach(function(r) {
    var el = document.getElementById(r.id);
    el.textContent = (r.ok ? '● ' : '○ ') + r.label;
    el.classList.toggle('met', r.ok);
  });
});
</script>
</body>
</html>
