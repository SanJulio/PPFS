<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Transactions</title>

<style>
body {
    background:#f2f4f7;
    padding:20px;
}

.card {
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    border:none;
}
</style>

</head>
<body>

<div class="container">

<div class="card p-3">

<h4 class="mb-3">Recent Transactions</h4>

<table class="table table-sm">

<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th class="text-end">Amount</th>
<th>Account</th>
</tr>
</thead>

<tbody>

{% for t in transactions %}

<tr>
<td>{{ t.date }}</td>
<td>{{ t.description }}</td>
<td class="text-end">£{{ "%.2f"|format(t.amount) }}</td>
<td>{{ t.account }}</td>
</tr>

{% endfor %}

</tbody>

</table>

<div class="mt-3">
<a href="/" class="btn btn-dark w-100">Back</a>
</div>

</div>

</div>

</body>
</html>
